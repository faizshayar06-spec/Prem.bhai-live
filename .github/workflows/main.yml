name: 12H Limited Stream

on:
  workflow_dispatch:
    inputs:
      run_count:
        description: 'Current run number (1 or 2)'
        default: '1'
        required: false

jobs:
  live:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Audio & Display
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb ffmpeg pulseaudio
          # PulseAudio Virtual Sink setup for StreamYard sound
          pulseaudio -D --exit-idle-time=-1
          pacmd load-module module-virtual-sink sink_name=vss
          pacmd set-default-sink vss
          Xvfb :99 -screen 0 1920x1080x24 &

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Libs
        run: pip install -r requirements.txt

      - name: Run Bot
        env:
          YT_STREAM_KEY: ${{ secrets.YT_STREAM_KEY }}
          DISPLAY: :99
        run: python stream_bot.py

      - name: Auto-Restart Logic (Limit to 12H)
        if: always()
        run: |
          CURRENT_RUN=${{ github.event.inputs.run_count || '1' }}
          if [ "$CURRENT_RUN" -lt "2" ]; then
            echo "Round 1 finished. Triggering Round 2 for 12H completion..."
            curl -X POST -H "Authorization: token ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/stream.yml/dispatches \
            -d '{"ref":"main", "inputs": {"run_count": "2"}}'
          else
            echo "12 Hours (Round 2) finished. Stream stopped successfully."
          fi
          
