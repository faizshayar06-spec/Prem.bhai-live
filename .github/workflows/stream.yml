name: 6-Hour Clean Stream

on:
  workflow_dispatch:

jobs:
  live:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4 # Latest version used

      - name: System Setup
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb ffmpeg pulseaudio fluxbox
          # Setup Audio
          pulseaudio -D --exit-idle-time=-1
          pacmd load-module module-virtual-sink sink_name=vss
          pacmd set-default-sink vss
          # Setup Screen
          Xvfb :99 -screen 0 1920x1080x24 &
          sleep 5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Selenium
        run: pip install selenium webdriver-manager

      - name: Run 6H Stream
        env:
          YT_STREAM_KEY: ${{ secrets.YT_STREAM_KEY }}
          DISPLAY: :99
        run: python streamyard_bot.py
        
