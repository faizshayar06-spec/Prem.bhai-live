name: 12-Hour Auto-Stop Stream

on:
  workflow_dispatch:
    inputs:
      run_count:
        description: 'Current Round'
        default: '1'
        required: false

jobs:
  live:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup System
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb ffmpeg pulseaudio
          pulseaudio -D --exit-idle-time=-1
          pacmd load-module module-virtual-sink sink_name=vss
          pacmd set-default-sink vss
          Xvfb :99 -screen 0 1920x1080x24 &
          sleep 5

      - name: Run Bot
        env:
          YT_STREAM_KEY: ${{ secrets.YT_STREAM_KEY }}
          DISPLAY: :99
        run: |
          pip install selenium webdriver-manager
          python streamyard_bot.py

      - name: Restart Logic (Stop after 12H)
        if: always()
        run: |
          CURRENT_ROUND=${{ github.event.inputs.run_count }}
          echo "Finished Round: $CURRENT_ROUND"
          
          if [ "$CURRENT_ROUND" -eq "1" ]; then
            echo "✅ 6 Hours done. Starting final 6 hours (Round 2)..."
            sleep 60
            curl -X POST -H "Authorization: token ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/stream.yml/dispatches \
            -d '{"ref":"main", "inputs": {"run_count": "2"}}'
          else
            echo "🏁 12 Hours completed. Automatic stop triggered."
          fi
          
